<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM – Intelligence Artificielle</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --card: #12121e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --correct: #00e096;
    --wrong: #ff4d6d;
    --text: #e8e8f0;
    --muted: #7070a0;
    --border: #2a2a40;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 10%, #1a1040 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, #0d1a30 0%, transparent 50%);
  }
  header { text-align: center; padding: 40px 20px 30px; }
  header h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  header p { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.8rem; }
  .stats-bar { display: flex; justify-content: center; gap: 30px; margin: 20px auto; max-width: 760px; flex-wrap: wrap; }
  .stat { text-align: center; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 24px; min-width: 100px; }
  .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
  .stat-lbl { font-size: 0.65rem; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  .progress-wrap { max-width: 760px; margin: 10px auto 30px; background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; }
  .quiz-container { max-width: 760px; margin: 0 auto; }
  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 24px; transition: all 0.3s; animation: slideIn 0.4s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .q-number { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
  .q-category { display: inline-block; background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3); color: var(--accent); font-size: 0.65rem; font-family: 'Space Mono', monospace; padding: 3px 10px; border-radius: 99px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .q-text { font-size: 1.05rem; font-weight: 700; line-height: 1.5; margin-bottom: 22px; color: var(--text); }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { background: rgba(255,255,255,0.03); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 18px; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 0.9rem; color: var(--text); text-align: left; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
  .option:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,99,255,0.1); transform: translateX(4px); }
  .option .opt-letter { width: 28px; height: 28px; min-width: 28px; border-radius: 8px; background: var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--muted); transition: all 0.2s; margin-top: 2px; }
  .option.correct { border-color: var(--correct); background: rgba(0,224,150,0.08); }
  .option.correct .opt-letter { background: var(--correct); color: #000; }
  .option.wrong { border-color: var(--wrong); background: rgba(255,77,109,0.08); }
  .option.wrong .opt-letter { background: var(--wrong); color: #fff; }
  .option:disabled { cursor: not-allowed; }
  .explanation { margin-top: 16px; padding: 14px 18px; background: rgba(108,99,255,0.08); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; font-size: 0.85rem; color: var(--muted); line-height: 1.6; display: none; }
  .explanation.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .nav-btns { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 30px; flex-wrap: wrap; }
  button.btn { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; padding: 12px 28px; border-radius: 12px; border: none; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:hover { opacity: 0.88; transform: scale(1.02); }
  .btn-secondary { background: var(--card); border: 1.5px solid var(--border); color: var(--muted); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
  .result-screen { display: none; text-align: center; padding: 60px 20px; animation: slideIn 0.5s ease; }
  .result-screen.show { display: block; }
  .score-circle { width: 160px; height: 160px; border-radius: 50%; margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: conic-gradient(var(--accent) var(--pct), var(--border) 0); position: relative; }
  .score-circle::before { content: ''; position: absolute; inset: 12px; background: var(--bg); border-radius: 50%; }
  .score-inner { position: relative; z-index: 1; }
  .score-num { font-size: 2.2rem; font-weight: 800; color: var(--accent); }
  .score-den { font-size: 0.7rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .result-msg { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
  .result-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 40px; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; max-width: 760px; margin-left: auto; margin-right: auto; }
  .filter-btn { font-family: 'Space Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px; padding: 6px 12px; border-radius: 99px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.1); }
  .counter-pill { font-family: 'Space Mono', monospace; font-size: 0.65rem; background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.25); padding: 4px 10px; border-radius: 99px; color: var(--accent); }
  .results-breakdown { max-width: 760px; margin: 30px auto 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .cat-result { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; text-align: left; }
  .cat-result-name { font-size: 0.7rem; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .cat-result-score { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>QCM — Intelligence Artificielle</h1>
  <p>Cours complet · 75 questions · Toutes les notions couvertes</p>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="s-current">1</div><div class="stat-lbl">Question</div></div>
  <div class="stat"><div class="stat-val" id="s-total">75</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-val" id="s-score">0</div><div class="stat-lbl">Score</div></div>
  <div class="stat"><div class="stat-val" id="s-pct">0%</div><div class="stat-lbl">Réussite</div></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progress-bar" style="width:1.3%"></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterCat('all',this)">Tout (75)</button>
  <button class="filter-btn" onclick="filterCat('Fondamentaux',this)">Fondamentaux</button>
  <button class="filter-btn" onclick="filterCat('Histoire',this)">Histoire</button>
  <button class="filter-btn" onclick="filterCat('Machine Learning',this)">Machine Learning</button>
  <button class="filter-btn" onclick="filterCat('Régression',this)">Régression</button>
  <button class="filter-btn" onclick="filterCat('Classification',this)">Classification</button>
  <button class="filter-btn" onclick="filterCat('Clustering',this)">Clustering</button>
  <button class="filter-btn" onclick="filterCat('Renforcement',this)">Renforcement</button>
  <button class="filter-btn" onclick="filterCat('Deep Learning',this)">Deep Learning</button>
  <button class="filter-btn" onclick="filterCat('IA Générative',this)">IA Générative</button>
  <button class="filter-btn" onclick="filterCat('Prompts',this)">Prompts</button>
  <button class="filter-btn" onclick="filterCat('Outils',this)">Outils</button>
</div>

<div id="quiz-screen" class="quiz-container">
  <div id="q-card" class="question-card"></div>
  <div class="nav-btns">
    <button class="btn btn-secondary" onclick="prevQ()">← Précédent</button>
    <span class="counter-pill" id="counter-pill">1 / 75</span>
    <button class="btn btn-primary" onclick="nextQ()">Suivant →</button>
  </div>
</div>

<div id="result-screen" class="result-screen">
  <div class="score-circle" id="score-circle">
    <div class="score-inner">
      <div class="score-num" id="final-score">0</div>
      <div class="score-den" id="final-den">/ 75</div>
    </div>
  </div>
  <div class="result-msg" id="result-msg"></div>
  <div class="result-sub" id="result-sub"></div>
  <div id="cat-breakdown" class="results-breakdown"></div>
  <div style="margin-top:30px">
    <button class="btn btn-primary" onclick="restart()" style="margin:8px">🔄 Recommencer</button>
    <button class="btn btn-secondary" onclick="reviewWrong()" style="margin:8px">❌ Revoir les erreurs</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  // ══════════════════════════════════════════════════════
  // FONDAMENTAUX (10)
  // ══════════════════════════════════════════════════════
  {
    cat:"Fondamentaux",
    q:"Quelle est la définition correcte de l'Intelligence Artificielle ?",
    opts:["La capacité d'un ordinateur à effectuer des calculs très rapides","La capacité d'un ordinateur à apprendre des données, corriger ses erreurs et prendre des décisions","Un logiciel qui simule uniquement l'apparence humaine","Un robot capable de se déplacer seul"],
    ans:1,
    exp:"L'IA est définie comme la capacité d'un ordinateur à apprendre des données, corriger ses erreurs et prendre des décisions."
  },
  {
    cat:"Fondamentaux",
    q:"Quelles sont les 5 étapes du fonctionnement de l'IA dans l'ordre correct ?",
    opts:["Apprentissage → Collecte → Modèle → Application → Amélioration","Collecte des données → Phase d'apprentissage → Modèle entraîné → Application → Amélioration","Application → Collecte → Apprentissage → Amélioration → Modèle","Modèle → Collecte → Application → Apprentissage → Amélioration"],
    ans:1,
    exp:"L'IA fonctionne en 5 étapes : 1-Collecte des données, 2-Phase d'apprentissage, 3-Modèle entraîné, 4-Application, 5-Amélioration continue."
  },
  {
    cat:"Fondamentaux",
    q:"Qu'est-ce qu'un agent d'intelligence artificielle ?",
    opts:["Un humain qui programme des robots","Un système capable de percevoir son environnement, analyser les informations et prendre des décisions","Un simple logiciel de traitement de texte","Une base de données intelligente"],
    ans:1,
    exp:"Un agent IA observe (reçoit des données), réfléchit (traite et apprend) et agit (donne une décision ou une action)."
  },
  {
    cat:"Fondamentaux",
    q:"Quels sont les deux types d'interactions d'un agent IA ?",
    opts:["Interaction vocale et visuelle","Interaction locale et distante","Interaction avec une base de données et interaction avec un environnement","Interaction en ligne et hors ligne"],
    ans:2,
    exp:"L'IA interagit soit avec une base de données (analyse → résultats), soit avec un environnement (perçoit l'état → réalise une action)."
  },
  {
    cat:"Fondamentaux",
    q:"Quelle capacité de l'IA correspond à la vidéosurveillance et la détection d'intrusion ?",
    opts:["Reconnaissance vocale","Prise de décision","Traduction","Perception visuelle"],
    ans:3,
    exp:"La perception visuelle permet d'analyser des images/vidéos : reconnaissance faciale, détection d'objets, vidéosurveillance."
  },
  {
    cat:"Fondamentaux",
    q:"La capacité de Google Translate est liée à quelle fonction de l'IA ?",
    opts:["Perception visuelle","Reconnaissance vocale","Traduction","Prise de décision"],
    ans:2,
    exp:"La traduction est la capacité d'un système à convertir un texte ou une parole d'une langue à une autre. Ex : Google Translate, DeepL."
  },
  {
    cat:"Fondamentaux",
    q:"Quelle est la hiérarchie correcte des composants de l'IA ?",
    opts:["Deep Learning ⊃ ML ⊃ Réseaux de neurones ⊃ IA","IA ⊃ Machine Learning ⊃ Réseaux de neurones ⊃ Deep Learning","ML ⊃ IA ⊃ Deep Learning ⊃ Réseaux de neurones","IA ⊃ Deep Learning ⊃ ML ⊃ Réseaux de neurones"],
    ans:1,
    exp:"L'IA est le domaine le plus large → ML (apprendre des données) → Réseaux de neurones (inspirés du cerveau) → Deep Learning (forme avancée)."
  },
  {
    cat:"Fondamentaux",
    q:"Quelle est la différence entre un modèle discriminatif et un modèle génératif ?",
    opts:["Il n'y a aucune différence","Le discriminatif classe/prédit des étiquettes, le génératif crée de nouvelles données similaires à celles apprises","Le discriminatif génère des images, le génératif classe les données","Le discriminatif utilise le Deep Learning, le génératif non"],
    ans:1,
    exp:"Modèle discriminatif : classe emails en spam/non spam. Modèle génératif : génère de nouvelles images de visages réalistes qui n'existent pas."
  },
  {
    cat:"Fondamentaux",
    q:"Quelle est la différence entre l'IA prédictive et l'IA générative ?",
    opts:["L'IA prédictive crée du contenu, l'IA générative prédit","L'IA prédictive prédit un résultat à partir de données passées, l'IA générative crée du contenu nouveau","Il n'y a aucune différence","L'IA prédictive est plus récente que l'IA générative"],
    ans:1,
    exp:"IA prédictive : anticipe un résultat (ex : diagnostic médical). IA générative : crée du contenu nouveau (texte, image, son, vidéo)."
  },
  {
    cat:"Fondamentaux",
    q:"Quels sont les deux types d'actions possibles lors d'une interaction avec une base de données ?",
    opts:["Lire et Écrire","Prédire et Classer","Analyser et Supprimer","Stocker et Récupérer"],
    ans:1,
    exp:"Lors d'une interaction avec une base de données, l'IA peut soit Prédire (estimer une valeur) soit Classer (organiser les données en catégories)."
  },

  // ══════════════════════════════════════════════════════
  // HISTOIRE (7)
  // ══════════════════════════════════════════════════════
  {
    cat:"Histoire",
    q:"Qu'a accompli Alan Turing pendant la Seconde Guerre mondiale ?",
    opts:["Inventé le premier ordinateur personnel","Déchiffré des messages allemands créés par la machine ENIGMA","Créé le premier réseau de neurones artificiel","Développé le premier robot autonome"],
    ans:1,
    exp:"Dans les années 40, Alan Turing a utilisé l'IA pour déchiffrer les messages chiffrés de la machine ENIGMA, aidant ainsi les Alliés."
  },
  {
    cat:"Histoire",
    q:"Quel est l'objectif du Test de Turing proposé en 1950 ?",
    opts:["Mesurer la vitesse de calcul d'un ordinateur","Vérifier si une IA est capable d'imiter une conversation humaine","Tester la résistance physique d'un robot","Évaluer la qualité d'une base de données"],
    ans:1,
    exp:"Le Test de Turing (1950) vise à évaluer la capacité d'une machine à penser de manière intelligente en imitant le comportement humain lors d'une conversation."
  },
  {
    cat:"Histoire",
    q:"Qu'a réalisé Arthur Samuel dans les années 60 ?",
    opts:["Battu le champion du monde aux échecs","Développé une IA qui joue au jeu de dames en auto-apprentissage","Inventé le Deep Learning","Créé le premier assistant vocal"],
    ans:1,
    exp:"Dans les années 60, Arthur Samuel a développé une IA capable de jouer au jeu de dames et de s'améliorer seule par auto-apprentissage."
  },
  {
    cat:"Histoire",
    q:"Qu'est-ce que le Machine Learning né dans les années 80 ?",
    opts:["Un robot physique programmable","Une méthode utilisant des probabilités statistiques pour donner aux ordinateurs la capacité d'apprendre sans programmation explicite","Un langage de programmation spécialisé","Un système de bases de données intelligent"],
    ans:1,
    exp:"Le Machine Learning (années 80) utilise des probabilités statistiques pour donner aux ordinateurs la capacité d'apprendre par eux-mêmes sans programmation explicite."
  },
  {
    cat:"Histoire",
    q:"En quelle année Deep Blue d'IBM a-t-il battu Garry Kasparov ?",
    opts:["1985","1990","1997","2005"],
    ans:2,
    exp:"En 1997, Deep Blue a battu Garry Kasparov, champion du monde des échecs, démontrant les progrès de l'IA dans les domaines compétitifs."
  },
  {
    cat:"Histoire",
    q:"Quelle technologie a révolutionné l'IA dans les années 2000-2010 ?",
    opts:["La programmation par règles","Le Deep Learning basé sur des réseaux de neurones artificiels s'inspirant du cerveau humain","Les bases de données relationnelles","Le traitement de texte automatique"],
    ans:1,
    exp:"Le Deep Learning (2000-2010), basé sur des réseaux de neurones artificiels, a révolutionné des domaines comme la reconnaissance d'images et le traitement du langage."
  },
  {
    cat:"Histoire",
    q:"Quelle est la 3ème vague d'évolution de l'IA (2020 à aujourd'hui) ?",
    opts:["Les robots physiques autonomes","Intégrer des capacités de raisonnement, d'apprentissage et de compréhension du langage naturel","Les bases de données distribuées","La programmation en langage naturel"],
    ans:1,
    exp:"La 3ème vague (2020+) vise à intégrer Réfléchir + Apprendre + Comprendre dans une même IA, comme les modèles GPT et les assistants virtuels avancés."
  },

  // ══════════════════════════════════════════════════════
  // MACHINE LEARNING GÉNÉRAL (5)
  // ══════════════════════════════════════════════════════
  {
    cat:"Machine Learning",
    q:"Quelle est la définition du Machine Learning ?",
    opts:["Programmer manuellement chaque règle que la machine doit suivre","Une branche de l'IA qui permet aux machines d'apprendre à partir de données sans être programmées explicitement","Un logiciel qui copie les réponses d'un expert humain","Un système qui mémorise toutes les données sans apprendre"],
    ans:1,
    exp:"Le ML permet aux machines d'identifier des motifs dans les données et d'améliorer leurs performances avec l'expérience, sans programmation explicite."
  },
  {
    cat:"Machine Learning",
    q:"Quelles sont les trois approches fondamentales du Machine Learning ?",
    opts:["Classification, Régression, Clustering","Supervisé, Non Supervisé, Renforcement","Profond, Superficiel, Moyen","Neuronal, Statistique, Probabiliste"],
    ans:1,
    exp:"Les 3 piliers : Supervisé (données étiquetées → prédire/classer), Non Supervisé (structures cachées), Renforcement (récompenses/pénalités)."
  },
  {
    cat:"Machine Learning",
    q:"Quelles sont les étapes du processus ML dans l'ordre correct ?",
    opts:["Entraîner → Identifier → Choisir → Construire → Opérationnel","Identifier → Choisir → Construire → Entraîner → Opérationnel","Opérationnel → Entraîner → Construire → Identifier","Choisir → Construire → Identifier → Entraîner → Opérationnel"],
    ans:1,
    exp:"1-Identifier les données, 2-Choisir l'algorithme adapté, 3-Construire le modèle, 4-Entraîner sur les données, 5-Rendre opérationnel."
  },
  {
    cat:"Machine Learning",
    q:"Quelles techniques importantes appartiennent au Machine Learning ?",
    opts:["HTML, CSS, JavaScript","Régression, Classification, SVM, Forêts aléatoires","Word, Excel, PowerPoint","Python, Java, C++"],
    ans:1,
    exp:"Le ML comprend : Régression (prédire une valeur), Classification (prédire une catégorie), SVM (séparation entre classes), Forêts aléatoires (ensemble d'arbres)."
  },
  {
    cat:"Machine Learning",
    q:"Quelle est la différence entre l'apprentissage supervisé et non supervisé ?",
    opts:["Il n'y a aucune différence","Supervisé utilise des données étiquetées pour prédire/classer ; non supervisé découvre des structures sans étiquettes","Supervisé est plus rapide que non supervisé","Non supervisé utilise des données étiquetées, supervisé non"],
    ans:1,
    exp:"Supervisé : données étiquetées, on connaît la bonne réponse. Non supervisé : pas d'étiquettes, la machine découvre seule les groupes et relations."
  },

  // ══════════════════════════════════════════════════════
  // RÉGRESSION (8)
  // ══════════════════════════════════════════════════════
  {
    cat:"Régression",
    q:"À quel type de problème s'applique la régression en apprentissage supervisé ?",
    opts:["Prédire une catégorie (spam/non spam)","Prédire une valeur continue et quantitative (prix, température, chiffre d'affaires)","Regrouper des données sans étiquettes","Générer de nouvelles images"],
    ans:1,
    exp:"La régression prédit une variable quantitative continue : prix d'une maison, température, chiffre d'affaires, gain financier."
  },
  {
    cat:"Régression",
    q:"Quelle est la formule de la régression linéaire simple ?",
    opts:["Y = aX² + b","Y = a/X + b","Y = aX + b","Y = a × b × X"],
    ans:2,
    exp:"Y = aX + b : 'a' est la pente (coefficient directeur) qui indique la variation de Y pour chaque unité de X, 'b' est la constante (ordonnée à l'origine)."
  },
  {
    cat:"Régression",
    q:"Dans Y = aX + b, que représente le coefficient 'a' ?",
    opts:["L'ordonnée à l'origine (valeur de Y quand X=0)","La pente (coefficient directeur) qui indique la variation de Y par unité de X","La variable dépendante à prédire","La constante indépendante"],
    ans:1,
    exp:"'a' est la pente (coefficient directeur) : il indique de combien Y augmente ou diminue pour chaque augmentation d'une unité de X."
  },
  {
    cat:"Régression",
    q:"Dans Y = aX + b, que représente 'b' ?",
    opts:["La pente de la droite","La variable à prédire","La constante (ordonnée à l'origine), valeur de Y quand X = 0","Le nombre de données d'entraînement"],
    ans:2,
    exp:"'b' est la constante ou ordonnée à l'origine : c'est la valeur que prend Y lorsque X est égal à 0."

let questions = [...ALL_QUESTIONS];
let current = 0;
let score = 0;
let answers = new Array(questions.length).fill(null);
let wrongOnly = false;

function filterCat(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  questions = cat === 'all' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.cat === cat);
  answers = new Array(questions.length).fill(null);
  score = 0; current = 0;
  document.getElementById('s-total').textContent = questions.length;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-screen').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = questions[current];
  const letters = ['A','B','C','D'];
  const answered = answers[current];

  const optsHTML = q.opts.map((opt, i) => {
    let cls = 'option';
    if (answered !== null) {
      if (i === q.ans) cls += ' correct';
      else if (i === answered && answered !== q.ans) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="selectAns(${i})" ${answered !== null ? 'disabled' : ''}>
      <span class="opt-letter">${letters[i]}</span><span>${opt}</span>
    </button>`;
  }).join('');

  document.getElementById('q-card').innerHTML = `
    <div class="q-number">Question ${current + 1} sur ${questions.length}</div>
    <div class="q-category">${q.cat}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${optsHTML}</div>
    <div class="explanation ${answered !== null ? 'show' : ''}">
      💡 <strong>Explication :</strong> ${q.exp}
    </div>`;

  const answered_count = answers.filter(a => a !== null).length;
  const correct_count = answers.filter((a, i) => a !== null && a === questions[i]?.ans).length;
  document.getElementById('s-current').textContent = current + 1;
  document.getElementById('s-score').textContent = correct_count;
  document.getElementById('s-pct').textContent = answered_count > 0 ? Math.round((correct_count / answered_count) * 100) + '%' : '0%';
  document.getElementById('counter-pill').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progress-bar').style.width = ((current + 1) / questions.length * 100) + '%';
}

function selectAns(i) {
  if (answers[current] !== null) return;
  answers[current] = i;
  if (i === questions[current].ans) score++;
  renderQ();
  setTimeout(() => {
    if (current < questions.length - 1) nextQ();
    else showResult();
  }, 1500);
}

function nextQ() {
  if (current < questions.length - 1) { current++; renderQ(); }
  else showResult();
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const total = questions.length;
  const correct = answers.filter((a, i) => a !== null && a === questions[i]?.ans).length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('final-score').textContent = correct;
  document.getElementById('final-den').textContent = `/ ${total}`;
  document.getElementById('score-circle').style.setProperty('--pct', `${pct * 3.6}deg`);

  let msg = '', sub = '';
  if (pct >= 90) { msg = '🏆 Excellent !'; sub = 'Maîtrise parfaite du cours IA !'; }
  else if (pct >= 75) { msg = '🎯 Très bien !'; sub = 'Bonne maîtrise, quelques révisions à faire.'; }
  else if (pct >= 60) { msg = '👍 Bien !'; sub = 'Des notions à revoir, continuez !'; }
  else if (pct >= 40) { msg = '📚 Passable'; sub = 'Révisions nécessaires sur plusieurs chapitres.'; }
  else { msg = '💪 À retravailler'; sub = 'Revoyez le cours et retentez !'; }

  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-sub').textContent = sub;

  // Category breakdown
  const cats = [...new Set(questions.map(q => q.cat))];
  const breakdownHTML = cats.map(cat => {
    const catQs = questions.map((q, i) => ({q, a: answers[i], i})).filter(x => x.q.cat === cat);
    const catCorrect = catQs.filter(x => x.a !== null && x.a === x.q.ans).length;
    const catTotal = catQs.length;
    return `<div class="cat-result">
      <div class="cat-result-name">${cat}</div>
      <div class="cat-result-score">${catCorrect}/${catTotal} <span style="font-size:0.7rem;color:var(--muted)">(${catTotal>0?Math.round(catCorrect/catTotal*100):0}%)</span></div>
    </div>`;
  }).join('');
  document.getElementById('cat-breakdown').innerHTML = breakdownHTML;
}

function restart() {
  score = 0; current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-screen').style.display = 'block';
  renderQ();
}

function reviewWrong() {
  const wrongQs = questions.filter((q, i) => answers[i] === null || answers[i] !== q.ans);
  if (wrongQs.length === 0) { alert('Bravo ! Aucune erreur à revoir !'); return; }
  questions = wrongQs;
  answers = new Array(questions.length).fill(null);
  score = 0; current = 0;
  document.getElementById('s-total').textContent = questions.length;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-screen').style.display = 'block';
  renderQ();
}

document.getElementById('s-total').textContent = questions.length;
renderQ();
</script>
